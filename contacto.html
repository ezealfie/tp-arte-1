<html lang="es">

    <meta charset="UTF-8">
    <title>Contacto - Guía de Viajes Argentina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div>
            <h1>Turismo Arg</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="destinos.html">Destinos</a></li>
                <li><a href="actividades.html">Qué hacer</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contacto</h2>

        <section class="caja-blanca">
            <div class="mitad">
                <h3>Trabajemos Juntos</h3>
                <p>Completá el formulario o escribinos directamente. Estamos para ayudarte a planificar tu viaje.</p>
                
                <iframe src="https://maps.google.com/maps?q=Buenos+Aires,Argentina&t=&z=10&ie=UTF8&iwloc=&output=embed" style="width: 100%; height: 15em; border: none; margin-top: 5%;"></iframe>

                <p style="margin-top: 5%;"><b>WhatsApp:</b> +54 11 1234-5678</p>
                <p><b>Email:</b> viajes@turismoarg.com.ar</p>
            </div>

            <div class="mitad">
                <form action="#" method="post">
                    <label>Nombre:</label>
                    <input type="text" name="nombre">

                    <label>Email:</label>
                    <input type="email" name="email">

                    <label>Destino de interés:</label>
                    <input type="text" name="asunto">

                    <label>Consulta o Mensaje:</label>
                    <textarea name="mensaje" rows="6"></textarea>

                    <input type="submit" value="Enviar Consulta">
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div>
            <p>© 2026 Guía de Viajes Argentina - TP 01</p>
        </div>
    </footer>

</body>
